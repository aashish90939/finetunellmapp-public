services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./hf-cache:/root/.cache/huggingface/hub

    # Uncomment the below to force platform when needed (e.g., M1):
    # platform: linux/amd64
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:  
      - "4173:4173"
    depends_on:
      - backend
